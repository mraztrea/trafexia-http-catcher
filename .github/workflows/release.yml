name: Build & Release

on:
  push:
    branches:
      - main

    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            build_cmd: yarn build:mac

          - os: windows-latest
            platform: win
            build_cmd: yarn build:win

          # Uncomment if needed
          # - os: ubuntu-latest
          #   platform: linux
          #   build_cmd: yarn build:linux

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Restore Electron cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('yarn.lock') }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libgbm1

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps
        continue-on-error: true

      - name: Typecheck
        run: yarn typecheck

      - name: Build app
        run: ${{ matrix.build_cmd }}

      - name: Show release files
        shell: bash
        run: |
          echo "==== RELEASE FILES ===="
          ls -lah release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trafexia-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/latest*.yml
          if-no-files-found: warn

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Show downloaded artifacts
        run: |
          echo "==== ARTIFACTS ===="
          find artifacts -type f

      - name: Set Release Variables
        id: release_vars
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag_name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_name=Release ${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag_name=latest" >> $GITHUB_OUTPUT
            echo "release_name=Trafexia Latest Beta (Rolling Build)" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_vars.outputs.tag_name }}
          name: ${{ steps.release_vars.outputs.release_name }}
          body: |
            ### 🚀 Trafexia Automatic Build
            This release contains the latest automated builds of Trafexia.
            
            * **Triggered by**: ${{ github.event_name }} on `${{ github.ref_name }}`
            * **Commit**: ${{ github.sha }}
            * **Build Time**: ${{ github.event.head_commit.timestamp || 'N/A' }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.release_vars.outputs.prerelease == 'true' }}
          files: |
            artifacts/*.exe
            artifacts/*.dmg
            artifacts/*.AppImage
            artifacts/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}